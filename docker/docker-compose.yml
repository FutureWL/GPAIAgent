version: '3.9'

services:
  # ==================== API 服务 ====================
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: gpai_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@10.0.0.1:5432/gpaiagent_dev?schema=public
      PORT: 3001
      NODE_ENV: production
      WEB_ORIGIN: http://localhost:3000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-ac...change-in-prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-re...change-in-prod}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== Web 前端 ====================
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: gpai_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
